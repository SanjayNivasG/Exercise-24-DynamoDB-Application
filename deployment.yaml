apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-api
  namespace: customer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-api
  template:
    metadata:
      labels:
        app: customer-api
    spec:
      serviceAccountName: customer-sa
      containers:
      - name: customer-api
        image: sanjaynivasg/customer-api:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: AWS_REGION
          value: us-east-1
---
apiVersion: v1
kind: Service
metadata:
  name: customer-api
  namespace: customer
spec:
  selector:
    app: customer-api
  ports:
  - port: 80
    targetPort: 5000
  type: LoadBalancer
